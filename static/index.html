<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Call</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: 0.02em; }
    #start-btn {
      padding: 14px 36px;
      font-size: 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #start-btn:hover:not(:disabled) { background: #1d4ed8; }
    #start-btn:disabled { background: #555; cursor: default; }
    #status { font-size: 0.9rem; color: #aaa; min-height: 1.2em; }
    #call-frame {
      display: none;
      width: min(960px, 100%);
      height: 600px;
      border: none;
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>AI Video Call</h1>
  <p id="status"></p>
  <button id="start-btn">Start Call</button>
  <div id="call-frame"></div>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <script>
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const frameContainer = document.getElementById('call-frame');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Creating room…';

      try {
        const res = await fetch('/room', { method: 'POST' });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const { url } = await res.json();

        status.textContent = 'Joining call…';
        frameContainer.style.display = 'block';

        const call = window.DailyIframe.createFrame(frameContainer, {
          iframeStyle: {
            width: '100%',
            height: '100%',
            border: 'none',
            borderRadius: '12px',
          },
          showLeaveButton: true,
          showFullscreenButton: true,
        });

        call.on('left-meeting', () => {
          frameContainer.style.display = 'none';
          btn.disabled = false;
          btn.textContent = 'Start New Call';
          status.textContent = 'Call ended.';
        });

        call.on('error', (e) => {
          status.textContent = `Error: ${e.errorMsg || 'unknown'}`;
          btn.disabled = false;
        });

        await call.join({ url });
        status.textContent = '';
      } catch (err) {
        status.textContent = `Failed to start call: ${err.message}`;
        btn.disabled = false;
        frameContainer.style.display = 'none';
      }
    });
  </script>
</body>
</html>
