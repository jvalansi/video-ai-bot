<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Call</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 500; letter-spacing: 0.02em; }
    #start-btn, #end-btn {
      padding: 14px 36px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #start-btn { background: #2563eb; color: #fff; }
    #start-btn:hover:not(:disabled) { background: #1d4ed8; }
    #start-btn:disabled { background: #555; cursor: default; }
    #end-btn { background: #dc2626; color: #fff; display: none; }
    #end-btn:hover { background: #b91c1c; }
    #status { font-size: 0.9rem; color: #aaa; min-height: 1.2em; }
    #call-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: min(480px, 100%);
    }
    #avatar-video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #222;
      border-radius: 12px;
      object-fit: cover;
    }
    #avatar-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #222;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
  </style>
</head>
<body>
  <h1>AI Video Call</h1>
  <p id="status"></p>
  <button id="start-btn">Start Call</button>

  <div id="call-ui">
    <div id="avatar-placeholder">🤖</div>
    <video id="avatar-video" autoplay playsinline style="display:none;"></video>
    <audio id="agent-audio" autoplay></audio>
    <button id="end-btn">End Call</button>
  </div>

  <!-- LiveKit JS client (ESM bundle via CDN) -->
  <script type="module">
    import {
      Room,
      RoomEvent,
      Track,
      VideoPresets,
    } from 'https://cdn.jsdelivr.net/npm/livekit-client@2/+esm';

    const startBtn = document.getElementById('start-btn');
    const endBtn = document.getElementById('end-btn');
    const statusEl = document.getElementById('status');
    const callUi = document.getElementById('call-ui');
    const avatarVideo = document.getElementById('avatar-video');
    const avatarPlaceholder = document.getElementById('avatar-placeholder');
    const agentAudio = document.getElementById('agent-audio');

    let room = null;

    function setStatus(msg) { statusEl.textContent = msg; }

    function attachTrack(track) {
      if (track.kind === Track.Kind.Video) {
        track.attach(avatarVideo);
        avatarVideo.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
      } else if (track.kind === Track.Kind.Audio) {
        track.attach(agentAudio);
      }
    }

    function detachTrack(track) {
      track.detach();
      if (track.kind === Track.Kind.Video) {
        avatarVideo.style.display = 'none';
        avatarPlaceholder.style.display = 'flex';
      }
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      setStatus('Connecting…');

      try {
        const res = await fetch('/token', { method: 'POST' });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const { token, url } = await res.json();

        room = new Room();

        room.on(RoomEvent.TrackSubscribed, (track) => {
          attachTrack(track);
        });

        room.on(RoomEvent.TrackUnsubscribed, (track) => {
          detachTrack(track);
        });

        room.on(RoomEvent.Disconnected, () => {
          endCall();
        });

        await room.connect(url, token);

        // Explicitly enable mic after connecting (required for mobile Safari)
        setStatus('Requesting microphone…');
        await room.localParticipant.setMicrophoneEnabled(true);

        const micTrack = room.localParticipant.getTrackPublication(Track.Source.Microphone);
        const micStatus = micTrack ? '🎤 Mic on' : '🔇 No mic — check browser permissions';

        callUi.style.display = 'flex';
        endBtn.style.display = 'block';
        setStatus(`Connected — ${micStatus}`);
      } catch (err) {
        setStatus(`Failed: ${err.message}`);
        startBtn.disabled = false;
      }
    });

    endBtn.addEventListener('click', () => {
      if (room) room.disconnect();
    });

    function endCall() {
      room = null;
      callUi.style.display = 'none';
      endBtn.style.display = 'none';
      avatarVideo.style.display = 'none';
      avatarPlaceholder.style.display = 'flex';
      startBtn.disabled = false;
      startBtn.textContent = 'Start New Call';
      setStatus('Call ended.');
    }
  </script>
</body>
</html>
